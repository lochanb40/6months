<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Time ❤️</title>

    <link rel="stylesheet" href="timer.css">
</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts"></div>

    <!-- Falling Petals -->
    <div class="particles"></div>

    <div class="container">

        <h1>⏳ Our Journey</h1>

        <p class="subtitle">
            Every second with you has been my favourite ❤️
        </p>

        <!-- Hourglass -->
      
<div class="hourglass">

    <div class="frame top-frame"></div>

    <div class="pillar left"></div>
    <div class="pillar right"></div>

    <div class="glass">

        <div class="top-bulb">
            <div class="sand-top"></div>
        </div>

        <div class="neck">
            <div class="sand-stream"></div>
        </div>

        <div class="bottom-bulb">
            <div class="sand-bottom"></div>
        </div>

    </div>

    <div class="frame bottom-frame"></div>

</div>

        <!-- Timer -->
        <div class="timer">

            <div class="box">
                <span id="months">0</span>
                <p>Months</p>
            </div>

            <div class="box">
                <span id="days">0</span>
                <p>Days</p>
            </div>

            <div class="box">
                <span id="hours">0</span>
                <p>Hours</p>
            </div>

            <div class="box">
                <span id="minutes">0</span>
                <p>Minutes</p>
            </div>

            <div class="box">
                <span id="seconds">0</span>
                <p>Seconds</p>
            </div>

        </div>

        <button onclick="location.href='gallery.html'">
            A Few Of My Favourite Memories→
        </button>

    </div>

    <script src="timer.js"></script>

</body>
</html>
